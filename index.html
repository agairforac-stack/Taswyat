<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Taswyat Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:35px;
border-radius:15px;
width:360px;
box-shadow:0 0 15px rgba(0,0,0,.15);
text-align:center;
}

h2{
color:#0a6cff;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#0a6cff;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#0056d6;
}

.link{
margin-top:15px;
color:#0a6cff;
cursor:pointer;
}

.msg{
margin-top:15px;
font-weight:bold;
}

.admin{
display:none;
}

</style>
</head>

<body>

<div class="box">

<h2>Taswyat System</h2>

<div id="loginBox">

<input id="username" placeholder="User Name">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="link" onclick="showRegister()">
تسجيل مستخدم جديد
</div>

</div>

<div id="registerBox" style="display:none">

<input id="newUser" placeholder="User Name">
<input id="newPass" type="password" placeholder="Password">

<button onclick="registerUser()">Register</button>

<div class="link" onclick="showLogin()">
عودة لتسجيل الدخول
</div>

</div>

<div id="adminPanel" class="admin">

<h3>طلبات التسجيل</h3>

<div id="usersList"></div>

</div>

<div class="msg" id="msg"></div>

</div>

<script>

const SUPABASE_URL =
"https://qsfbbsnjwoltvppfmgvi.supabase.co";

const SUPABASE_KEY =
"sb_publishable_Nhl9BWQngYQKiz140tYYHg_Qe-Xa2wQ";

const client = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

function msg(t){
document.getElementById("msg").innerHTML=t;
}

function showRegister(){
document.getElementById("loginBox").style.display="none";
document.getElementById("registerBox").style.display="block";
}

function showLogin(){
document.getElementById("loginBox").style.display="block";
document.getElementById("registerBox").style.display="none";
}

async function registerUser(){

let u=document.getElementById("newUser").value;
let p=document.getElementById("newPass").value;

if(!u||!p){
msg("أدخل البيانات");
return;
}

const hash=await sha256(p);

const {error}=await client
.from("app_users")
.insert({
username:u,
password_hash:hash,
role:"user",
status:"pending"
});

if(error){
msg(error.message);
}
else{
msg("تم التسجيل — فى انتظار موافقة السوبر أدمن");
showLogin();
}

}

async function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

const hash=await sha256(p);

const {data,error}=await client
.from("app_users")
.select("*")
.eq("username",u)
.eq("password_hash",hash)
.single();

if(error||!data){
msg("بيانات غير صحيحة");
return;
}

if(data.status!="approved"){
msg("الحساب غير مفعل");
return;
}

if(data.role=="super_admin"){

document.getElementById("adminPanel")
.style.display="block";

loadUsers();

msg("مرحبا Admin");

}
else{

msg("تم تسجيل الدخول بنجاح");

}

}

async function loadUsers(){

const {data}=await client
.from("app_users")
.select("*")
.eq("status","pending");

let html="";

data.forEach(u=>{

html+=`
<div style='border:1px solid #ccc;
padding:10px;
margin:10px;
border-radius:8px'>

${u.username}

<button onclick='approve(${u.id})'>
Approve
</button>

</div>
`;

});

document.getElementById("usersList").innerHTML=html;

}

async function approve(id){

await client
.from("app_users")
.update({status:"approved"})
.eq("id",id);

loadUsers();

}

async function sha256(str){

const buf=await crypto.subtle.digest(
"SHA-256",
new TextEncoder().encode(str)
);

return Array.from(new Uint8Array(buf))
.map(b=>b.toString(16).padStart(2,"0"))
.join("");

}

</script>

</body>
</html>
