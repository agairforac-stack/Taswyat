<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Taswyat System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;color:#1f2937}
.login-wrap{height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:white;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.12);padding:28px}
.login-card{width:380px;text-align:center}
h1,h2,h3{margin-top:0;color:#0f172a}
input,select,button,textarea{padding:12px;border-radius:10px;border:1px solid #cbd5e1;font-size:15px;box-sizing:border-box}
input,select,textarea{width:100%;background:white}
button{border:none;background:#0a6cff;color:white;font-weight:bold;cursor:pointer}
button:hover{background:#0058d4}
button.gray{background:#475569}
button.green{background:#198754}
button.red{background:#dc3545}
button.orange{background:#f59e0b}
button.small{padding:7px 12px;font-size:13px}
.link{color:#0a6cff;cursor:pointer;margin-top:12px}
.msg{font-weight:bold;margin-top:12px}
.hidden{display:none!important}
.app{display:none}
.sidebar{width:240px;background:#0f172a;color:white;position:fixed;right:0;top:0;bottom:0;padding:20px}
.sidebar h2{color:white}
.sidebar button{width:100%;margin:6px 0;background:#1e293b;text-align:right}
.main{margin-right:280px;padding:25px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.full{grid-column:1/-1}
.table{width:100%;border-collapse:collapse;margin-top:15px;background:white}
.table th,.table td{border:1px solid #e5e7eb;padding:10px;text-align:center}
.table th{background:#f8fafc}
.badge{padding:4px 10px;border-radius:20px;font-size:13px;font-weight:bold}
.pending{background:#fff3cd;color:#856404}
.approved{background:#d1e7dd;color:#0f5132}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.summary .box{background:white;border-radius:15px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:999}
.modal{background:white;width:92%;max-width:1200px;max-height:90vh;overflow:auto;border-radius:18px;padding:25px}
.modal-header{display:flex;justify-content:space-between;align-items:center}
.calc-box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:15px;margin-top:15px}
@media(max-width:900px){.sidebar{position:static;width:auto}.main{margin:0}.grid,.grid2,.summary{grid-template-columns:1fr}}
</style>
</head>

<body>

<div id="loginPage" class="login-wrap">
<div class="card login-card">
<h1>برنامج التسويات</h1>

<div id="loginBox">
<input id="loginUser" placeholder="User Name">
<br><br>
<input id="loginPass" type="password" placeholder="Password">
<br><br>
<button onclick="login()">Login</button>
<div class="link" onclick="showRegister()">تسجيل مستخدم جديد</div>
</div>

<div id="registerBox" class="hidden">
<input id="regUser" placeholder="User Name">
<br><br>
<input id="regPass" type="password" placeholder="Password">
<br><br>
<button onclick="registerUser()">Register</button>
<div class="link" onclick="showLogin()">Back to login</div>
</div>

<div id="loginMsg" class="msg"></div>
</div>
</div>

<div id="app" class="app">
<div class="sidebar">
<h2>Taswyat</h2>
<p id="currentUserText"></p>
<button onclick="showPage('homePage')">الرئيسية</button>
<button onclick="showPage('newSettlementPage')">إدخال تسوية</button>
<button onclick="showPage('searchPage')">بحث برقم التسوية</button>
<button onclick="showPage('accountPage')">كشف حساب</button>
<button id="usersBtn" class="hidden" onclick="showPage('usersPage');loadPendingUsers()">اعتماد المستخدمين</button>
<button class="red" onclick="logout()">تسجيل خروج</button>
</div>

<div class="main">

<div id="homePage" class="card page">
<h1>لوحة التحكم</h1>
<p>اختر من القائمة الجانبية.</p>
</div>

<div id="newSettlementPage" class="card page hidden">
<h2>بيانات التسوية</h2>
<div class="grid">
<input id="ownerName" placeholder="اسم صاحب التسوية">
<input id="settlementNo" placeholder="رقم التسوية">
<input id="entryDate" type="date">
</div>
<br>
<button onclick="createHeader()">دخول</button>

<div id="lineSection" class="hidden">
<hr>
<h2>إدخال بنود التسوية</h2>
<div class="grid">
<input id="lineDate" type="date">
<input id="description" placeholder="البيان">
<input id="addedTo" placeholder="مضاف إلى">

<select id="mainDirection">
<option value="">التوجيه العام</option>
<option>مصروفات</option>
<option>ايرادات</option>
<option>تمويل</option>
</select>

<select id="subDirection" onchange="handleSubDirection()">
<option value="">التوجيه الفرعى</option>
<option>خامات</option>
<option>انتقالات</option>
<option>بدلات</option>
<option>مرتبات</option>
<option>مصروفات ادارية وعمومية</option>
<option>نثريات</option>
<option>تأمينات اجتماعية</option>
<option>مصروفات المكتب</option>
<option>اجرة عمال يومية</option>
</select>

<input id="site" placeholder="الموقع">
<input id="amount" type="number" placeholder="المبلغ">
</div>
<br>
<button onclick="addLine()">إدخال</button>
<div id="linesArea"></div>
</div>
</div>

<div id="searchPage" class="card page hidden">
<h2>بحث برقم التسوية</h2>
<div class="grid2">
<input id="searchNo" placeholder="رقم التسوية">
<button onclick="searchSettlement()">بحث</button>
</div>
<div id="searchResult"></div>
</div>

<div id="accountPage" class="card page hidden">
<h2>كشف حساب صاحب التسوية</h2>
<div class="grid2">
<input id="accountOwner" placeholder="اسم صاحب التسوية">
<button onclick="accountStatement()">عرض كشف الحساب</button>
</div>
<div id="accountResult"></div>
</div>

<div id="usersPage" class="card page hidden">
<h2>طلبات تسجيل المستخدمين</h2>
<div id="pendingUsers"></div>
</div>

</div>
</div>

<div id="invoiceModal" class="modal-bg">
<div class="modal">
<div class="modal-header">
<h2>فاتورة خامات</h2>
<button class="red small" onclick="closeInvoice()">إغلاق</button>
</div>

<div class="grid">
<input id="invDate" type="date">
<input id="invSite" placeholder="الموقع">
<select id="invType" onchange="calcInvoice()">
<option>ضريبية</option>
<option>بدون ضريبة</option>
</select>
<input id="invNo" placeholder="رقم الفاتورة">
<input id="invBuyer" placeholder="المشترى">
<input id="sellerName" placeholder="اسم البائع">
<input id="sellerPhone" placeholder="رقم تليفون البائع">
<input id="sellerAddress" placeholder="عنوان البائع">
</div>

<table class="table" id="invoiceItemsTable">
<thead>
<tr>
<th>م</th><th>البيان</th><th>الوحدة</th><th>الكمية</th><th>سعر الوحدة</th><th>الإجمالى</th>
</tr>
</thead>
<tbody id="invoiceItems"></tbody>
</table>

<div class="calc-box">
<div class="grid">
<input id="invoiceTotal" readonly placeholder="الإجمالي العام">
<input id="discountPercent" type="number" placeholder="نسبة الخصم %" oninput="calcInvoice()">
<input id="discountValue" readonly placeholder="قيمة الخصم">
<input id="commercialTaxPercent" type="number" placeholder="ضريبة أ.ت.ص %" oninput="calcInvoice()">
<input id="commercialTaxValue" readonly placeholder="قيمة ضريبة أ.ت.ص">
<input id="vatValue" readonly placeholder="ضريبة القيمة المضافة 14%">
<input id="netTotal" readonly placeholder="الصافي">
</div>
</div>

<br>
<button class="green" onclick="saveInvoiceToAmount()">إدخال الفاتورة وترحيل الصافي للمبلغ</button>
</div>
</div>

<div id="transportModal" class="modal-bg">
<div class="modal">
<div class="modal-header">
<h2>انتقالات / خط سير</h2>
<button class="red small" onclick="closeTransport()">إغلاق</button>
</div>

<div class="grid">
<input id="routeFrom" placeholder="من">
<input id="routeTo" placeholder="إلى">
<button onclick="calcDistance()">حساب المسافة</button>
<input id="distanceKm" type="number" placeholder="المسافة كم" oninput="calcTransport()">
<input id="ratePerKm" type="number" placeholder="القيمة لكل كم" oninput="calcTransport()">
<input id="transportTotal" readonly placeholder="الإجمالي المحسوب">
<input id="manualTransportAmount" type="number" placeholder="أو أدخل المبلغ مباشرة">
</div>

<br>
<button class="green" onclick="saveTransportToAmount()">إدخال وترحيل المبلغ</button>
</div>
</div>

<script>
const SUPABASE_URL = "https://qsfbbsnjwoltvppfmgvi.supabase.co";
const SUPABASE_KEY = "sb_publishable_Nhl9BWQngYQKiz140tYYHg_Qe-Xa2wQ";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let activeSettlementNo = null;

function msg(t,c="red"){let m=document.getElementById("loginMsg");m.innerHTML=t;m.style.color=c}
function showRegister(){loginBox.classList.add("hidden");registerBox.classList.remove("hidden");msg("")}
function showLogin(){registerBox.classList.add("hidden");loginBox.classList.remove("hidden");msg("")}

async function sha256(text){
const data=new TextEncoder().encode(text);
const hash=await crypto.subtle.digest("SHA-256",data);
return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function login(){
const username=loginUser.value.trim();
const password=loginPass.value.trim();
if(!username||!password){msg("اكتب اسم المستخدم وكلمة المرور");return}
const passwordHash=await sha256(password);
const {data,error}=await client.from("app_users").select("*").eq("username",username).eq("password_hash",passwordHash).maybeSingle();
if(error||!data){msg("بيانات غير صحيحة");return}
if(data.status!=="approved"){msg("الحساب غير مفعل بعد");return}
currentUser=data;
localStorage.setItem("taswyat_user",JSON.stringify(data));
openApp();
}

async function registerUser(){
const username=regUser.value.trim();
const password=regPass.value.trim();
if(!username||!password){msg("اكتب اسم المستخدم وكلمة المرور");return}
const passwordHash=await sha256(password);
const {error}=await client.from("app_users").insert({username,password_hash:passwordHash,role:"user",status:"pending"});
if(error){msg("اسم المستخدم موجود بالفعل أو يوجد خطأ");return}
msg("تم التسجيل بنجاح - في انتظار موافقة السوبر أدمن","green");
showLogin();
}

function openApp(){
loginPage.style.display="none";
app.style.display="block";
currentUserText.innerHTML="المستخدم: "+currentUser.username;
if(currentUser.role==="super_admin") usersBtn.classList.remove("hidden");
showPage("homePage");
}

function logout(){localStorage.removeItem("taswyat_user");location.reload()}

window.onload=()=>{
const saved=localStorage.getItem("taswyat_user");
if(saved){currentUser=JSON.parse(saved);openApp()}
entryDate.value=new Date().toISOString().slice(0,10);
lineDate.value=new Date().toISOString().slice(0,10);
invDate.value=new Date().toISOString().slice(0,10);
buildInvoiceRows();
}

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

async function createHeader(){
const owner=ownerName.value.trim();
const no=settlementNo.value.trim();
const date=entryDate.value;
if(!owner||!no||!date){alert("اكمل بيانات التسوية");return}
const {error}=await client.from("settlement_headers").insert({
owner_name:owner,
settlement_no:no,
entry_date:date,
created_by:currentUser.username
});
if(error){alert("رقم التسوية موجود أو يوجد خطأ");return}
activeSettlementNo=no;
lineSection.classList.remove("hidden");
loadLines(no);
}

function handleSubDirection(){
if(subDirection.value==="خامات"){openInvoice()}
if(subDirection.value==="انتقالات"){openTransport()}
}

async function addLine(){
if(!activeSettlementNo){alert("ادخل بيانات التسوية أولا");return}
if(!lineDate.value||!description.value||!mainDirection.value||!subDirection.value||!amount.value){
alert("اكمل بيانات البند");return
}
const {error}=await client.from("settlement_lines").insert({
settlement_no:activeSettlementNo,
line_date:lineDate.value,
description:description.value,
added_to:addedTo.value,
site:site.value,
main_direction:mainDirection.value,
sub_direction:subDirection.value,
amount:Number(amount.value),
status:"pending",
created_by:currentUser.username
});
if(error){alert("حدث خطأ أثناء الحفظ");return}
description.value="";addedTo.value="";site.value="";amount.value="";
loadLines(activeSettlementNo);
}

async function loadLines(no){
const {data}=await client.from("settlement_lines").select("*").eq("settlement_no",no).order("id");
renderLines(data||[],linesArea,true);
}

function renderLines(data,container,showActions){
let html=`<table class="table"><tr>
<th>التاريخ</th><th>البيان</th><th>مضاف إلى</th><th>التوجيه العام</th><th>التوجيه الفرعى</th><th>الموقع</th><th>المبلغ</th><th>الحالة</th><th>إجراء</th>
</tr>`;
data.forEach(r=>{
let statusClass=r.status==="approved"?"approved":"pending";
let actions="-";
if(showActions && r.status!=="approved"){
actions=`<button class="small orange" onclick="editLine(${r.id})">تعديل</button>`;
if(currentUser.role==="super_admin") actions+=` <button class="small green" onclick="approveLine(${r.id})">اعتماد</button>`;
}
html+=`<tr>
<td>${r.line_date}</td>
<td>${r.description}</td>
<td>${r.added_to||""}</td>
<td>${r.main_direction}</td>
<td>${r.sub_direction}</td>
<td>${r.site||""}</td>
<td>${Number(r.amount).toLocaleString()}</td>
<td><span class="badge ${statusClass}">${r.status}</span></td>
<td>${actions}</td>
</tr>`;
});
html+="</table>";
container.innerHTML=html;
}

async function approveLine(id){
await client.from("settlement_lines").update({status:"approved"}).eq("id",id);
loadLines(activeSettlementNo);
}

async function editLine(id){
const {data}=await client.from("settlement_lines").select("*").eq("id",id).maybeSingle();
if(!data||data.status==="approved"){alert("لا يمكن التعديل بعد الاعتماد");return}
lineDate.value=data.line_date;
description.value=data.description;
addedTo.value=data.added_to||"";
site.value=data.site||"";
mainDirection.value=data.main_direction;
subDirection.value=data.sub_direction;
amount.value=data.amount;
await client.from("settlement_lines").delete().eq("id",id);
loadLines(activeSettlementNo);
}

async function searchSettlement(){
const no=searchNo.value.trim();
if(!no){alert("اكتب رقم التسوية");return}
const {data:header}=await client.from("settlement_headers").select("*").eq("settlement_no",no).maybeSingle();
const {data:lines}=await client.from("settlement_lines").select("*").eq("settlement_no",no).eq("status","approved").order("id");
if(!header){searchResult.innerHTML="<p>لا توجد تسوية بهذا الرقم</p>";return}
searchResult.innerHTML=`<h3>صاحب التسوية: ${header.owner_name}</h3><p>تاريخ الإدخال: ${header.entry_date}</p><div id="approvedLines"></div>`;
renderLines(lines||[],document.getElementById("approvedLines"),false);
}

async function accountStatement(){
const owner=accountOwner.value.trim();
if(!owner){alert("اكتب اسم صاحب التسوية");return}
const {data:headers}=await client.from("settlement_headers").select("*").eq("owner_name",owner);
if(!headers||headers.length===0){accountResult.innerHTML="<p>لا توجد تسويات لهذا الاسم</p>";return}
const nos=headers.map(h=>h.settlement_no);
const {data:lines}=await client.from("settlement_lines").select("*").in("settlement_no",nos).eq("status","approved");
let funding=0,expenses=0,revenues=0;
(lines||[]).forEach(l=>{
if(l.main_direction==="تمويل") funding+=Number(l.amount);
else if(l.main_direction==="مصروفات") expenses+=Number(l.amount);
else if(l.main_direction==="ايرادات") revenues+=Number(l.amount);
});
let balance=funding+revenues-expenses;
accountResult.innerHTML=`
<div class="summary">
<div class="box"><h3>إجمالي العهدة / التمويل</h3><h2>${funding.toLocaleString()}</h2></div>
<div class="box"><h3>إجمالي المصروفات المعتمدة</h3><h2>${expenses.toLocaleString()}</h2></div>
<div class="box"><h3>الرصيد</h3><h2>${balance.toLocaleString()}</h2></div>
</div>
<h3>البنود المعتمدة</h3>
<div id="accountLines"></div>`;
renderLines(lines||[],document.getElementById("accountLines"),false);
}

async function loadPendingUsers(){
const {data}=await client.from("app_users").select("*").eq("status","pending");
let html="";
(data||[]).forEach(u=>{
html+=`<div class="card" style="margin:10px 0"><b>${u.username}</b><br><br>
<button class="green small" onclick="approveUser(${u.id})">Approve</button>
<button class="red small" onclick="rejectUser(${u.id})">Reject</button></div>`;
});
pendingUsers.innerHTML=html||"لا توجد طلبات";
}

async function approveUser(id){await client.from("app_users").update({status:"approved"}).eq("id",id);loadPendingUsers()}
async function rejectUser(id){await client.from("app_users").update({status:"rejected"}).eq("id",id);loadPendingUsers()}

function openInvoice(){invoiceModal.style.display="flex"}
function closeInvoice(){invoiceModal.style.display="none"}

function buildInvoiceRows(){
let html="";
for(let i=1;i<=10;i++){
html+=`<tr>
<td>${i}</td>
<td><input class="inv-desc"></td>
<td><input class="inv-unit"></td>
<td><input type="number" class="inv-qty" oninput="calcInvoice()"></td>
<td><input type="number" class="inv-price" oninput="calcInvoice()"></td>
<td><input class="inv-total" readonly></td>
</tr>`;
}
invoiceItems.innerHTML=html;
}

function calcInvoice(){
let rows=document.querySelectorAll("#invoiceItems tr");
let total=0;
rows.forEach(r=>{
let q=Number(r.querySelector(".inv-qty").value||0);
let p=Number(r.querySelector(".inv-price").value||0);
let t=q*p;
r.querySelector(".inv-total").value=t.toFixed(2);
total+=t;
});
let discP=Number(discountPercent.value||0);
let discV=total*discP/100;
let afterDisc=total-discV;
let commP=Number(commercialTaxPercent.value||0);
let commV=afterDisc*commP/100;
let taxable=afterDisc-commV;
let vat=invType.value==="ضريبية"?taxable*0.14:0;
let net=taxable+vat;

invoiceTotal.value=total.toFixed(2);
discountValue.value=discV.toFixed(2);
commercialTaxValue.value=commV.toFixed(2);
vatValue.value=vat.toFixed(2);
netTotal.value=net.toFixed(2);
}

async function saveInvoiceToAmount(){
calcInvoice();
amount.value=Number(netTotal.value||0).toFixed(2);
if(!description.value) description.value="فاتورة خامات رقم " + (invNo.value||"");
if(!site.value) site.value=invSite.value||"";

if(activeSettlementNo){
const inv={settlement_no:activeSettlementNo,invoice_date:invDate.value,site:invSite.value,invoice_type:invType.value,invoice_no:invNo.value,buyer:invBuyer.value,seller_name:sellerName.value,seller_phone:sellerPhone.value,seller_address:sellerAddress.value,total_before_discount:Number(invoiceTotal.value||0),discount_percent:Number(discountPercent.value||0),discount_value:Number(discountValue.value||0),commercial_tax_percent:Number(commercialTaxPercent.value||0),commercial_tax_value:Number(commercialTaxValue.value||0),vat_value:Number(vatValue.value||0),net_total:Number(netTotal.value||0),created_by:currentUser.username};
const {data,error}=await client.from("material_invoices").insert(inv).select().single();
if(!error&&data){
let items=[];
document.querySelectorAll("#invoiceItems tr").forEach((r,i)=>{
let desc=r.querySelector(".inv-desc").value;
let unit=r.querySelector(".inv-unit").value;
let qty=Number(r.querySelector(".inv-qty").value||0);
let price=Number(r.querySelector(".inv-price").value||0);
let total=qty*price;
if(desc||qty||price){
items.push({invoice_id:data.id,serial_no:i+1,description:desc,unit,quantity:qty,unit_price:price,total});
}
});
if(items.length) await client.from("material_invoice_items").insert(items);
}
}

closeInvoice();
}

function openTransport(){transportModal.style.display="flex"}
function closeTransport(){transportModal.style.display="none"}

async function getCoords(address){
let url="https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(address);
let res=await fetch(url);
let data=await res.json();
if(!data||!data.length) return null;
return {lat:Number(data[0].lat),lon:Number(data[0].lon)};
}

function haversine(a,b){
const R=6371;
let dLat=(b.lat-a.lat)*Math.PI/180;
let dLon=(b.lon-a.lon)*Math.PI/180;
let lat1=a.lat*Math.PI/180;
let lat2=b.lat*Math.PI/180;
let x=Math.sin(dLat/2)**2+Math.sin(dLon/2)**2*Math.cos(lat1)*Math.cos(lat2);
return 2*R*Math.asin(Math.sqrt(x));
}

async function calcDistance(){
if(!routeFrom.value||!routeTo.value){alert("اكتب من وإلى");return}
try{
let a=await getCoords(routeFrom.value);
let b=await getCoords(routeTo.value);
if(!a||!b){alert("لم يتم حساب المسافة. ادخل المسافة يدوياً.");return}
distanceKm.value=haversine(a,b).toFixed(2);
calcTransport();
}catch(e){alert("تعذر حساب المسافة. ادخل المسافة يدوياً.")}
}

function calcTransport(){
let d=Number(distanceKm.value||0);
let r=Number(ratePerKm.value||0);
transportTotal.value=(d*r).toFixed(2);
}

async function saveTransportToAmount(){
calcTransport();
let finalAmount=Number(manualTransportAmount.value||0);
if(!finalAmount) finalAmount=Number(transportTotal.value||0);
amount.value=finalAmount.toFixed(2);
if(!description.value) description.value="انتقالات من " + routeFrom.value + " إلى " + routeTo.value;

if(activeSettlementNo){
await client.from("transport_routes").insert({
settlement_no:activeSettlementNo,
route_from:routeFrom.value,
route_to:routeTo.value,
distance_km:Number(distanceKm.value||0),
rate_per_km:Number(ratePerKm.value||0),
manual_amount:Number(manualTransportAmount.value||0),
total_amount:finalAmount,
created_by:currentUser.username
});
}

closeTransport();
}
</script>
